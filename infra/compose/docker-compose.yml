services:
  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    env_file:
      - ../../.env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-root}
    volumes:
      - mongo_data:/data/db
      - ../../infra/docker/mongo/init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  socket-producer:
    image: python:3.11-slim
    container_name: socket-producer
    depends_on:
      - mongo
    environment:
      SOCKET_PORT: 9999
      STREAM_RATE_HZ: "5"
      STREAM_LOOP: "true"
      RAW_PATH: /app/data/raw/dataset_sentimientos_500.csv
    volumes:
      - ../..:/app
    working_dir: /app/services/spark-pipeline
    command: >
      bash -c "pip install -q pandas &&
        python -m src.producers.socket_producer"
    restart: unless-stopped

  spark-master:
    build:
      context: ../..
      dockerfile: infra/docker/spark.Dockerfile
    container_name: spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "8080:8080"
    environment:
      SPARK_MODE: master
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5

  spark-worker:
    build:
      context: ../..
      dockerfile: infra/docker/spark.Dockerfile
    container_name: spark-worker
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077

  spark-pipeline:
    build:
      context: ../..
      dockerfile: infra/docker/spark.Dockerfile
    container_name: spark-pipeline
    user: root
    depends_on:
      spark-master:
        condition: service_healthy
      socket-producer:
        condition: service_started
    env_file:
      - ../../.env
    environment:
      - SPARK_MASTER_URL=spark://spark-master:7077
      - MODEL_PATH=/app/data/models/v1.0.0
    volumes:
      - ../..:/app
    working_dir: /app/services/spark-pipeline
    command: >
      bash -c "pip install -q -r requirements.txt &&
        python3 -m src.main.stream_main"
    restart: unless-stopped

  api:
    build:
      context: ../../services/api
      dockerfile: Dockerfile
    container_name: api
    ports:
      - "5000:5000"
    env_file:
      - ../../.env
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
    name: sentimentstream_mongo_data

networks:
  default:
    name: sentimentstream_net
